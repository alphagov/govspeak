version: 2
updates:
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    cooldown:
      default-days: 3
    groups:
      test:
        patterns:
          - "minitest"
          - "mocha"
          - "simplecov"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "07:00"
    cooldown:
      default-days: 3
